<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ディーラーテスト問題管理・フォーム生成ツール</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- アイコンコンポーネント ---
    const Plus = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const Trash2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
    const ChevronDown = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
    const ChevronUp = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const GripVertical = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>;
    const Gamepad2 = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="6" y1="12" x2="10" y2="12"></line><line x1="8" y1="10" x2="8" y2="14"></line><line x1="15" y1="13" x2="15.01" y2="13"></line><line x1="18" y1="11" x2="18.01" y2="11"></line><rect x="2" y="6" width="20" height="12" rx="2"></rect></svg>;
    const Spade = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 13.522C5 11.233 12 2 12 2s7 9.233 7 11.522c0 2.38-1.56 4.478-4.5 4.478-1.574 0-2.886-.688-3.5-2.012-.614 1.324-1.926 2.012-3.5 2.012-2.94 0-4.5-2.098-4.5-4.478z"></path><path d="M12 18v4"></path><path d="M8 22h8"></path></svg>;
    const SquareUser = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"></rect><circle cx="12" cy="10" r="3"></circle><path d="M7 21v-2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v2"></path></svg>;
    const Coins = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="8" r="6"></circle><path d="M18.09 10.37A6 6 0 1 1 10.34 18"></path><path d="M7 6h1v4"></path><path d="M16.71 13.88l-1.42 1.42"></path></svg>;
    const RotateCcw = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>;
    const FileCode = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><polyline points="10 13 8 15 10 17"></polyline><polyline points="14 13 16 15 14 17"></polyline></svg>;
    const Copy = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const X = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const Check = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>;

    // ゲームごとの設定とテーマカラー
    const GAME_CONFIG = {
      poker: {
        id: 'poker',
        name: 'ポーカー',
        icon: Spade,
        theme: {
          primary: 'bg-emerald-600',
          hover: 'hover:bg-emerald-700',
          text: 'text-emerald-600',
          border: 'border-emerald-500',
          lightBg: 'bg-emerald-50',
          addBtnHover: 'hover:border-emerald-500 hover:text-emerald-600 hover:bg-emerald-50'
        },
        categories: [
          { name: '大問1', title: '語句問題' },
          { name: '大問2', title: '役判定、アクション順、レイズ額' },
          { name: '大問3', title: '所作、TDA案件処理' },
          { name: '大問4', title: 'トーナメント進行、ポット計算' }
        ]
      },
      blackjack: {
        id: 'blackjack',
        name: 'ブラックジャック',
        icon: SquareUser,
        theme: {
          primary: 'bg-blue-600',
          hover: 'hover:bg-blue-700',
          text: 'text-blue-600',
          border: 'border-blue-500',
          lightBg: 'bg-blue-50',
          addBtnHover: 'hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50'
        },
        categories: [
          { name: '大問1', title: '基本語句・ルール' },
          { name: '大問2', title: '配当・アクション処理' }
        ]
      },
      baccarat: {
        id: 'baccarat',
        name: 'バカラ',
        icon: Coins,
        theme: {
          primary: 'bg-rose-600',
          hover: 'hover:bg-rose-700',
          text: 'text-rose-600',
          border: 'border-rose-500',
          lightBg: 'bg-rose-50',
          addBtnHover: 'hover:border-rose-500 hover:text-rose-600 hover:bg-rose-50'
        },
        categories: [
          { name: '大問1', title: '基本語句・ルール' },
          { name: '大問2', title: '3枚目ルール・配当' }
        ]
      }
    };

    // 初期サンプルデータ
    const initialQuestions = [
      { id: '1', game: 'poker', category: '大問1', text: 'ストラドルを説明せよ', correctAnswer: 'UTGがブラインドの2倍額をブラインドとして出すオプションルール', explanation: 'ストラドルは主にUTGがブラインドの2倍額をブラインドとして出すオプションルールです。' },
      { id: '2', game: 'poker', category: '大問1', text: '相手が出したチップに対してさらに上乗せすることを何と呼ぶか答えよ', correctAnswer: 'レイズ', explanation: '同額を出すのがコール、さらに額をつり上げるのがレイズです。' },
      { id: '1_1', game: 'poker', category: '大問1', text: '「アンテ」の意味として正しいものは？', correctAnswer: 'ゲーム参加者全員が毎ハンド支払う強制参加費', explanation: 'アンテはポットを大きくしゲームを活性化するために支払う参加費です。' },
      { id: '3', game: 'poker', category: '大問2', text: 'ブラインド100/200。UTGが500にレイズしました。次のプレイヤーのミニマムレイズ額は？', correctAnswer: '800', explanation: 'レイズ幅は500-200=300。次は500+300=800がミニマムとなります。' },
      { id: '4', game: 'poker', category: '大問3', text: 'TDAルールにおいて、アウトオブターン（順番飛ばし）のアクションはどのように扱われるか？', correctAnswer: 'アクションが回ってくるまでに状況が変わらなければ拘束される', explanation: '前方のプレイヤーのアクションが変わらない限り、アウトオブターンのアクションは有効として扱われます。' },
      { id: '5', game: 'poker', category: '大問4', text: 'ブラインド100/200。Aが500にレイズ、Bがショートスタックで600のオールイン。Cがコール。Aに順番が戻った時、Aはリオープン可能か？', correctAnswer: '不可能（コールまたはフォールドのみ）', explanation: 'ショートオールインはフルレイズ額に達していないため、既にアクションを終えているAはリオープンできません。' },
      
      { id: 'bj1_1', game: 'blackjack', category: '大問1', text: '最初の2枚で「A」と「10点のカード（10, J, Q, K）」が揃うことを何と呼ぶか？', correctAnswer: 'ブラックジャック（またはナチュラル）', explanation: 'Aと10点札の組み合わせをブラックジャックと呼びます。' },
      { id: 'bj1_2', game: 'blackjack', category: '大問1', text: 'プレイヤーがカードをもう1枚要求するアクションを何と呼ぶか？', correctAnswer: 'ヒット', explanation: 'カードを追加で引くアクションは「ヒット」です。' },
      { id: 'bj2_1', game: 'blackjack', category: '大問2', text: '通常のブラックジャック（BJ）が完成して勝利した場合の配当はいくらか？', correctAnswer: '1.5倍 (3 to 2)', explanation: 'BJの配当は通常1.5倍（3 to 2）です。' },
      
      { id: 'bac1_1', game: 'baccarat', category: '大問1', text: 'バカラにおいて勝敗を決めるのは、カードの合計の「下一桁」がいくつに近い方か？', correctAnswer: '9', explanation: 'バカラは合計の下一桁が「9」に近い方が勝利となります。' },
      { id: 'bac2_1', game: 'baccarat', category: '大問2', text: 'プレイヤーの最初の2枚の合計が「5」の時、プレイヤー側のアクションはどうなるか？', correctAnswer: '3枚目を引く（ヒット）', explanation: 'プレイヤーの合計が「0〜5」の場合は必ず3枚目のカードを引きます。' }
    ];

    // 初期設定データ（配点と出題数）
    const initialTestSettings = {
      poker: {
        '大問1': { count: 10, point: 2 },
        '大問2': { count: 5, point: 3 },
        '大問3': { count: 5, point: 4 },
        '大問4': { count: 7, point: 5 }
      },
      blackjack: {
        '大問1': { count: 10, point: 2 },
        '大問2': { count: 5, point: 3 }
      },
      baccarat: {
        '大問1': { count: 10, point: 2 },
        '大問2': { count: 5, point: 3 }
      }
    };

    const LOCAL_STORAGE_DATA_KEY = 'dealer_test_data';
    const LOCAL_STORAGE_SETTING_KEY = 'dealer_test_settings';

    function App() {
      // データの読み込み
      const [questions, setQuestions] = useState(() => {
        try {
          const saved = localStorage.getItem(LOCAL_STORAGE_DATA_KEY);
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return initialQuestions;
      });

      // 設定の読み込み
      const [testSettings, setTestSettings] = useState(() => {
        try {
          const saved = localStorage.getItem(LOCAL_STORAGE_SETTING_KEY);
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return initialTestSettings;
      });

      const [activeGame, setActiveGame] = useState('poker');
      const [activeTab, setActiveTab] = useState('大問1');
      const [expandedId, setExpandedId] = useState(null);
      
      // モーダル制御用
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [gasCode, setGasCode] = useState('');
      const [copied, setCopied] = useState(false);

      // 自動保存
      useEffect(() => {
        localStorage.setItem(LOCAL_STORAGE_DATA_KEY, JSON.stringify(questions));
        localStorage.setItem(LOCAL_STORAGE_SETTING_KEY, JSON.stringify(testSettings));
      }, [questions, testSettings]);

      useEffect(() => {
        setActiveTab(GAME_CONFIG[activeGame].categories[0].name);
        setExpandedId(null);
      }, [activeGame]);

      const currentTheme = GAME_CONFIG[activeGame].theme;
      const currentCategories = GAME_CONFIG[activeGame].categories;

      // 問題の追加・削除・更新
      const addQuestion = (category) => {
        const newId = Math.random().toString(36).substr(2, 9);
        setQuestions([...questions, { id: newId, game: activeGame, category: category, text: '', correctAnswer: '', explanation: '' }]);
        setExpandedId(newId);
      };
      const removeQuestion = (id) => {
        if (confirm('この問題を削除しますか？')) setQuestions(questions.filter(q => q.id !== id));
      };
      const updateQuestion = (id, field, value) => {
        setQuestions(questions.map(q => q.id === id ? { ...q, [field]: value } : q));
      };

      // 設定（配点・出題数）の更新
      const updateSetting = (field, value) => {
        const numValue = Math.max(0, parseInt(value) || 0); // 0以上の数値に限定
        setTestSettings(prev => ({
          ...prev,
          [activeGame]: {
            ...prev[activeGame],
            [activeTab]: {
              ...prev[activeGame][activeTab],
              [field]: numValue
            }
          }
        }));
      };

      // データリセット
      const resetData = () => {
        if (confirm('追加した問題や設定をすべて初期状態に戻しますか？（この操作は取り消せません）')) {
          setQuestions(initialQuestions);
          setTestSettings(initialTestSettings);
        }
      };

      // 現在のゲームにおける満点を計算
      const currentTotalScore = Object.entries(testSettings[activeGame]).reduce((sum, [cat, setting]) => {
        return sum + (setting.point * setting.count);
      }, 0);

      // --- Googleフォーム自動作成用 GASプログラムの生成 ---
      const generateGASCode = () => {
        const currentSettings = testSettings[activeGame];
        const gameQuestions = questions.filter(q => q.game === activeGame);
        
        // フォームに必要な「問題文」と「カテゴリ」だけを抽出（ヒントや解答を含めない）
        const exportQuestions = gameQuestions.map(q => ({
          category: q.category,
          text: q.text
        }));

        const code = `function create${GAME_CONFIG[activeGame].id.charAt(0).toUpperCase() + GAME_CONFIG[activeGame].id.slice(1)}TestForm() {
  const formTitle = "${GAME_CONFIG[activeGame].name} ディーラーテスト";
  const form = FormApp.create(formTitle);
  
  form.setIsQuiz(true);
  form.setAllowResponseEdits(false);
  form.addTextItem().setTitle("氏名").setRequired(true);

  // ツールで設定された配点と出題数
  const testSettings = ${JSON.stringify(currentSettings, null, 2)};
  
  // ツールに登録されている問題データ（問題文のみ）
  const allQuestions = ${JSON.stringify(exportQuestions, null, 2)};

  const circleNumbers = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩", "⑪", "⑫", "⑬", "⑭", "⑮", "⑯", "⑰", "⑱", "⑲", "⑳"];

  let sectionIndex = 1;

  for (const category in testSettings) {
    const config = testSettings[category];
    if (config.count <= 0) continue; // 出題数0の場合はスキップ

    form.addPageBreakItem().setTitle(category + " (1問 " + config.point + "点 / " + config.count + "問)");

    // この大問の問題を抽出
    let pool = allQuestions.filter(function(q) { return q.category === category; });

    // 設定された出題数がプールの問題数を上回る場合の安全処理
    const actualCount = Math.min(config.count, pool.length);

    // ランダムにシャッフル (Fisher-Yates)
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      let temp = pool[i];
      pool[i] = pool[j];
      pool[j] = temp;
    }

    // シャッフルされた中から指定された数だけ抽出
    const selected = pool.slice(0, actualCount);

    selected.forEach(function(q, i) {
      const item = form.addParagraphTextItem();
      const prefix = (i < circleNumbers.length) ? circleNumbers[i] : "(" + (i+1) + ")";
      const qTitle = sectionIndex + "-" + prefix + " " + q.text;
      
      item.setTitle(qTitle);
      item.setPoints(config.point);
      item.setRequired(true);
      // ※要求仕様に従い、解説や正解フィードバックはフォームに追加しません。
    });
    
    sectionIndex++;
  }
  
  // 実行結果の通知
  const ui = SpreadsheetApp.getUi();
  if(ui) {
    ui.alert("フォームを作成しました。", "Googleドライブのルートフォルダを確認してください。", ui.ButtonSet.OK);
  } else {
    Logger.log("フォームを作成しました。Googleドライブを確認してください。");
  }
}`;
        setGasCode(code);
        setIsModalOpen(true);
      };

      // クリップボードへのコピー機能（iframe制限回避のため execCommand を使用）
      const copyToClipboard = () => {
        const textArea = document.createElement("textarea");
        textArea.value = gasCode;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        } catch (err) {
          console.error('コピーに失敗しました', err);
        }
        document.body.removeChild(textArea);
      };

      const filteredQuestions = questions.filter(q => q.game === activeGame && q.category === activeTab);
      const activeCategoryDesc = currentCategories.find(c => c.name === activeTab) || currentCategories[0];
      const activeTabSettings = testSettings[activeGame][activeTab];

      return (
        <div className="min-h-screen flex flex-col">
          
          {/* ヘッダー */}
          <header className="bg-slate-900 text-white p-4 shadow-md sticky top-0 z-20">
            <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:justify-between md:items-center gap-4">
              <div className="flex items-center space-x-2">
                <Gamepad2 className="w-6 h-6 text-emerald-400" />
                <h1 className="text-xl font-bold tracking-wider">ディーラーテスト問題管理ツール</h1>
              </div>
              
              <div className="flex flex-wrap items-center gap-2">
                <div className="hidden sm:block mr-4 text-sm font-bold text-slate-300">
                  総得点: <span className="text-white text-lg">{currentTotalScore}点</span>
                </div>
                <button 
                  onClick={resetData}
                  className="flex items-center space-x-1 text-slate-300 px-3 py-2 rounded-md text-sm font-medium transition-colors hover:text-white hover:bg-slate-800 border border-slate-700"
                >
                  <RotateCcw className="w-4 h-4" />
                  <span>初期化</span>
                </button>
                <button 
                  onClick={generateGASCode}
                  className={`flex items-center space-x-2 text-white px-5 py-2 rounded-md font-bold transition-colors shadow-sm ${currentTheme.primary} ${currentTheme.hover}`}
                >
                  <FileCode className="w-5 h-5" />
                  <span>Googleフォーム作成スクリプト出力</span>
                </button>
              </div>
            </div>
          </header>

          {/* ゲーム切り替えタブ */}
          <div className="bg-white border-b border-slate-200 shadow-sm sticky top-[72px] md:top-[76px] z-10">
            <div className="max-w-6xl mx-auto flex overflow-x-auto">
              {Object.values(GAME_CONFIG).map(game => {
                const Icon = game.icon;
                const isActive = activeGame === game.id;
                return (
                  <button
                    key={game.id}
                    onClick={() => setActiveGame(game.id)}
                    className={`flex-1 flex justify-center items-center space-x-2 py-4 px-6 font-bold text-sm sm:text-base transition-all whitespace-nowrap
                      ${isActive ? `border-b-4 ${game.theme.border} ${game.theme.text} bg-slate-50` : 'border-b-4 border-transparent text-slate-500 hover:bg-slate-50 hover:text-slate-700'}
                    `}
                  >
                    <Icon className={`w-5 h-5 ${isActive ? game.theme.text : 'text-slate-400'}`} />
                    <span>{game.name}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <main className="max-w-6xl w-full mx-auto p-4 flex flex-col md:flex-row gap-6 mt-4 flex-1">
            
            {/* サイドバー */}
            <aside className="w-full md:w-64 flex-shrink-0">
              <div className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden sticky top-40">
                <div className={`p-4 ${currentTheme.primary} text-white font-bold flex justify-between items-center`}>
                  <span>大問選択</span>
                  <span className="text-xs font-bold bg-white/20 px-2 py-1 rounded-full">{currentTotalScore}点満点</span>
                </div>
                <ul className="flex flex-col">
                  {currentCategories.map(cat => {
                    const isTabActive = activeTab === cat.name;
                    const cSet = testSettings[activeGame][cat.name];
                    return (
                      <li key={cat.name}>
                        <button
                          onClick={() => setActiveTab(cat.name)}
                          className={`w-full text-left px-4 py-3 flex flex-col transition-colors border-l-4 ${isTabActive ? `${currentTheme.border} ${currentTheme.lightBg}` : 'border-transparent hover:bg-slate-50'}`}
                        >
                          <div className={`font-bold ${isTabActive ? currentTheme.text : 'text-slate-700'}`}>{cat.name}</div>
                          <div className="text-xs text-slate-500 mt-1">{cSet.count}問 × {cSet.point}点 = {cSet.count * cSet.point}点</div>
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </div>
            </aside>

            {/* メインコンテンツ */}
            <div className="flex-1">
              
              {/* テスト出題設定パネル */}
              <div className={`mb-6 p-5 rounded-lg border-2 shadow-sm ${currentTheme.lightBg} border-opacity-50 ${currentTheme.border}`}>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <h2 className={`text-xl font-bold ${currentTheme.text}`}>{activeCategoryDesc.name}：{activeCategoryDesc.title}</h2>
                    <p className="text-slate-600 text-sm mt-1">このカテゴリの問題プールから、設定した出題数がランダムに抽出されます。</p>
                  </div>
                </div>
                
                <div className="flex flex-wrap gap-6 items-end bg-white p-4 rounded-md border border-slate-200">
                  <div className="flex flex-col">
                    <label className="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">1問の配点</label>
                    <div className="flex items-center space-x-2">
                      <input 
                        type="number" min="0" value={activeTabSettings.point} 
                        onChange={(e) => updateSetting('point', e.target.value)} 
                        className="w-20 p-2 text-lg font-bold border border-slate-300 rounded focus:ring-2 focus:ring-opacity-50 outline-none text-center" 
                      />
                      <span className="text-slate-600 font-medium">点</span>
                    </div>
                  </div>
                  <div className="flex flex-col">
                    <label className="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">出題数 (ランダム抽出)</label>
                    <div className="flex items-center space-x-2">
                      <input 
                        type="number" min="0" value={activeTabSettings.count} 
                        onChange={(e) => updateSetting('count', e.target.value)} 
                        className="w-20 p-2 text-lg font-bold border border-slate-300 rounded focus:ring-2 focus:ring-opacity-50 outline-none text-center" 
                      />
                      <span className="text-slate-600 font-medium">問 <span className="text-xs text-slate-400">/ プール {filteredQuestions.length}問中</span></span>
                    </div>
                  </div>
                  <div className="flex flex-col ml-auto text-right">
                    <span className="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">この大問の合計点</span>
                    <span className={`text-2xl font-black ${currentTheme.text}`}>
                      {activeTabSettings.point * activeTabSettings.count} <span className="text-base font-bold">点</span>
                    </span>
                  </div>
                </div>
              </div>

              {/* 問題リスト */}
              <div className="space-y-4">
                {filteredQuestions.length === 0 ? (
                  <div className="bg-white rounded-lg p-12 text-center border-2 border-dashed border-slate-300">
                    <p className="text-slate-500 mb-4">この大問にはまだ問題プールがありません。</p>
                  </div>
                ) : (
                  filteredQuestions.map((q, index) => (
                    <div key={q.id} className="bg-white rounded-lg shadow-sm border border-slate-200 overflow-hidden transition-all">
                      <div className="flex items-center justify-between p-4 cursor-pointer hover:bg-slate-50" onClick={() => setExpandedId(expandedId === q.id ? null : q.id)}>
                        <div className="flex items-center space-x-3 overflow-hidden">
                          <GripVertical className="w-5 h-5 text-slate-400 flex-shrink-0" />
                          <span className={`font-bold flex-shrink-0 ${currentTheme.text}`}>No.{index + 1}</span>
                          <span className="font-medium truncate text-slate-700">{q.text || <span className="text-slate-400 italic">問題文を入力...</span>}</span>
                        </div>
                        <div className="flex items-center space-x-4 flex-shrink-0 ml-4">
                          {expandedId === q.id ? <ChevronUp className="w-5 h-5 text-slate-400" /> : <ChevronDown className="w-5 h-5 text-slate-400" />}
                        </div>
                      </div>

                      {expandedId === q.id && (
                        <div className={`p-5 border-t border-slate-100 bg-slate-50`}>
                          <div className="space-y-4">
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-1">問題文 (フォームに表示されます)</label>
                              <textarea value={q.text} onChange={(e) => updateQuestion(q.id, 'text', e.target.value)} className="w-full p-2 border border-slate-300 rounded-md outline-none" rows="2" />
                            </div>
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-1">模範解答 (ツール上での管理用)</label>
                              <textarea value={q.correctAnswer} onChange={(e) => updateQuestion(q.id, 'correctAnswer', e.target.value)} className="w-full p-2 border border-slate-300 rounded-md outline-none font-medium text-slate-600" rows="1" />
                            </div>
                            <div>
                              <label className="block text-sm font-bold text-slate-700 mb-1">解説 (ツール上での管理用)</label>
                              <textarea value={q.explanation} onChange={(e) => updateQuestion(q.id, 'explanation', e.target.value)} className="w-full p-2 border border-slate-300 rounded-md outline-none text-sm text-slate-500" rows="1" />
                            </div>
                            <div className="flex justify-end pt-2 border-t border-slate-200">
                              <button onClick={() => removeQuestion(q.id)} className="flex items-center space-x-1 text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-md text-sm font-medium"><Trash2 className="w-4 h-4" /><span>削除</span></button>
                            </div>
                          </div>
                        </div>
                      )}
                    </div>
                  ))
                )}
                
                <button onClick={() => addQuestion(activeTab)} className={`w-full flex items-center justify-center space-x-2 py-4 border-2 border-dashed border-slate-300 text-slate-500 rounded-lg transition-colors font-medium ${currentTheme.addBtnHover}`}>
                  <Plus className="w-5 h-5" /><span>新しい問題をプールに追加</span>
                </button>
              </div>
            </div>
          </main>

          {/* GASコード表示用モーダル */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col overflow-hidden">
                <div className={`p-4 flex justify-between items-center text-white ${currentTheme.primary}`}>
                  <h3 className="text-xl font-bold flex items-center gap-2"><FileCode className="w-6 h-6"/> Googleフォーム自動作成用スクリプト</h3>
                  <button onClick={() => setIsModalOpen(false)} className="hover:bg-white/20 p-1 rounded-full transition-colors"><X className="w-6 h-6" /></button>
                </div>
                
                <div className="p-6 overflow-y-auto flex-1 bg-slate-50">
                  <div className="mb-4 bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-lg text-sm leading-relaxed">
                    <p className="font-bold mb-2">【使い方】</p>
                    <ol className="list-decimal list-inside space-y-1 ml-1">
                      <li>ご自身のGoogleスプレッドシート（またはGoogleドライブ）を開きます。</li>
                      <li>上部メニューの <strong>「拡張機能」</strong> ＞ <strong>「Apps Script」</strong> をクリックします。</li>
                      <li>最初から入力されているコードを消し、下のコードを<strong>すべて貼り付け</strong>ます。</li>
                      <li>画面上部の <strong>「▷ 実行」</strong> ボタンを押すと、設定通りのGoogleフォームが作成されます！</li>
                    </ol>
                  </div>
                  
                  <div className="relative group">
                    <div className="absolute top-2 right-2">
                      <button 
                        onClick={copyToClipboard}
                        className={`flex items-center space-x-1 px-3 py-1.5 rounded-md text-sm font-bold shadow-sm transition-all ${copied ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-white hover:bg-slate-700'}`}
                      >
                        {copied ? <><Check className="w-4 h-4" /><span>コピーしました!</span></> : <><Copy className="w-4 h-4" /><span>コードをコピー</span></>}
                      </button>
                    </div>
                    <pre className="bg-slate-900 text-slate-300 p-4 rounded-lg overflow-x-auto text-sm font-mono border border-slate-700 pb-8"><code className="language-javascript">{gasCode}</code></pre>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
